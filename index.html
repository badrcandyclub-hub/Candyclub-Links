<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candy Club Hub | كاندي كلوب</title>
    
    <!-- Google Fonts: Cairo -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Animated ambient background -->
    <div class="background-animation"></div>
    
    <main class="container">
        <!-- GLOBAL HEADER -->
        <header class="glass-card fade-in-up" style="animation-delay: 0.1s;">
            <div class="logo-container">
                <!-- Placeholder for 3D Logo -->
                <div class="logo-placeholder">
                    <i class="fa-solid fa-candy-cane"></i>
                </div>
            </div>
            <h1>أهلاً بك في عالم كاندي كلوب</h1>
            <p>اكتشف السعادة في كل قطعة</p>
        </header>

        <!-- SOCIAL MEDIA SHOWCASE -->
        <section class="social-section fade-in-up" style="animation-delay: 0.2s;">
            <a href="https://www.instagram.com/candyclub.eg/" target="_blank" class="glass-button social-btn instagram">
                <i class="fa-brands fa-instagram"></i>
                <span>انستجرام</span>
            </a>
            <a href="https://www.facebook.com/CandyClubEGofficial/about?locale=ar_AR" target="_blank" class="glass-button social-btn facebook">
                <i class="fa-brands fa-facebook-f"></i>
                <span>فيسبوك</span>
            </a>
            <a href="https://www.tiktok.com/@candyclubegofficial?lang=ar" target="_blank" class="glass-button social-btn tiktok">
                <i class="fa-brands fa-tiktok"></i>
                <span>تيك توك</span>
            </a>
            <a href="https://whatsapp.com/channel/0029VamFNnoJUM2XzfZjO211" target="_blank" class="glass-button social-btn whatsapp-channel">
                <i class="fa-brands fa-whatsapp"></i>
                <span>قناة واتساب</span>
            </a>
        </section>

        <!-- SMART REQUEST FORM -->
        <section class="request-section glass-card fade-in-up" style="animation-delay: 0.3s;">
            <h2>اطلب اللي ناقصك</h2>
            <p class="subtitle">مش لاقي منتج معين؟ اطلبه وهنوفرهولك!</p>
            
            <form id="productRequestForm" class="smart-form">
                <div class="input-group">
                    <input type="text" id="productName" placeholder="اسم المنتج..." required>
                </div>
                
                <div class="file-upload-group">
                    <input type="file" id="productImage" class="hidden-file-input" accept="image/*">
                    <label for="productImage" class="file-upload-label glass-button">
                        <i class="fa-solid fa-cloud-arrow-up"></i>
                        <span id="fileName">إرفاق صورة للمنتج</span>
                    </label>
                </div>
                
                <button type="submit" id="submitBtn" class="primary-btn glass-button">
                    <span class="btn-text">إرسال الطلب</span>
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </form>
        </section>

        <!-- QUICK ACTION BUTTONS -->
        <section class="actions-section fade-in-up" style="animation-delay: 0.4s;">
            <!-- WhatsApp Action -->
            <a href="https://wa.me/201080269555" target="_blank" class="glass-button whatsapp-btn">
                <i class="fa-brands fa-whatsapp"></i>
                <span>تواصل معنا عبر واتساب</span>
            </a>

            <!-- InstaPay Action -->
            <div class="instapay-card glass-card">
                <div class="instapay-header">
                    <i class="fa-solid fa-money-bill-transfer instapay-logo-icon"></i>
                    <h3>الدفع عبر إنستاباي</h3>
                </div>
                
                <div class="account-details">
                    <div class="qr-placeholder">
                        <i class="fa-solid fa-qrcode"></i>
                    </div>
                    <p class="account-name"><strong>اسم الحساب:</strong> كاندي كلوب</p>
                    
                    <div class="copy-group">
                        <span id="accountNumber" class="account-number">01012440044</span>
                        <button type="button" id="copyBtn" class="icon-btn glass-button" title="نسخ الرقم">
                            <i class="fa-regular fa-copy"></i>
                        </button>
                    </div>
                </div>
            </div>
        </section>
        
        <footer>
            <p>&copy; 2026 كاندي كلوب. جميع الحقوق محفوظة.</p>
        </footer>
    </main>

    <script src="script.js"></script>
</body>
</html>
