<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Candy Club Hub | كاندي كلوب</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="logo.png">

    <!-- Google Fonts: Cairo -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="background-mesh">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <main class="container">
        <!-- GLOBAL HEADER -->
        <header class="glass-card animate-fade-in">
            <div class="logo-wrapper">
                <img src="logo.png" alt="Candy Club Logo" class="brand-logo">
            </div>
            <h1>أهلاً بك في كاندي كلوب</h1>
            <p>حيث تكتمل سعادتك 🍭</p>
        </header>

        <!-- SOCIAL MEDIA LINKS -->
        <section class="links-grid animate-fade-in" style="animation-delay: 0.1s;">
            <a href="https://www.instagram.com/candyclub.eg/" target="_blank" class="glass-btn instagram-btn">
                <div class="btn-icon"><i class="fa-brands fa-instagram"></i></div>
                <div class="btn-text">انستجرام</div>
            </a>
            <a href="https://www.tiktok.com/@candyclubegofficial?lang=ar" target="_blank" class="glass-btn tiktok-btn">
                <div class="btn-icon"><i class="fa-brands fa-tiktok"></i></div>
                <div class="btn-text">تيك توك</div>
            </a>
            <a href="https://www.facebook.com/CandyClubEGofficial/about?locale=ar_AR" target="_blank" class="glass-btn facebook-btn">
                <div class="btn-icon"><i class="fa-brands fa-facebook-f"></i></div>
                <div class="btn-text">فيسبوك</div>
            </a>
            <a href="https://wa.me/201080269555" target="_blank" class="glass-btn whatsapp-btn">
                <div class="btn-icon"><i class="fa-brands fa-whatsapp"></i></div>
                <div class="btn-text">اطلب عبر واتساب</div>
            </a>
        </section>

        <!-- INSTAPAY SECTION -->
        <section class="instapay-card glass-card animate-fade-in" style="animation-delay: 0.2s;">
            <div class="instapay-header">
                <i class="fa-solid fa-bolt"></i>
                <h2>الدفع عبر إنستاباي</h2>
            </div>
            <div class="instapay-details">
                <p class="account-name">عبد الرحمن</p>
                <div class="copy-box">
                    <span class="account-number" id="accountNumber">01012440044</span>
                    <button class="copy-btn" id="copyBtn" aria-label="Copy InstaPay Number">
                        <i class="fa-regular fa-copy"></i>
                    </button>
                </div>
            </div>
        </section>

        <!-- SMART REQUEST FORM -->
        <section class="request-card glass-card animate-fade-in" style="animation-delay: 0.3s;">
            <div class="request-header">
                <i class="fa-solid fa-box-open"></i>
                <h2>اطلب اللي ناقصك</h2>
            </div>
            <p class="subtitle">مش لاقي منتج معين؟ اطلبه وهنوفرهولك!</p>
            
            <form id="productRequestForm" class="glass-form">
                <div class="input-group">
                    <input type="text" id="productName" placeholder="اسم المنتج اللي بتدور عليه..." required>
                </div>
                
                <div class="file-upload-group">
                    <input type="file" id="productImage" class="hidden-file-input" accept="image/*">
                    <label for="productImage" class="file-upload-btn">
                        <i class="fa-solid fa-image"></i>
                        <span id="fileName">إرفاق صورة للمنتج (اختياري)</span>
                    </label>
                </div>
                
                <button type="submit" id="submitBtn" class="submit-btn">
                    <span class="btn-text">إرسال الطلب</span>
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </form>
        </section>

        <footer>
            <p>&copy; 2026 Candy Club. All rights reserved.</p>
        </footer>
    </main>

    <script src="script.js"></script>
</body>
</html>
